<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Store</title>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .header-logo { font-size: 1.1rem; letter-spacing: 0.5rem; margin-bottom: 60px; }
        .header-logo a { color: #ffffff; text-decoration: none; }
        .store-container { max-width: 800px; width: 100%; }
        .section-title { font-size: 0.8rem; letter-spacing: 0.2rem; color: #555555; border-bottom: 1px solid #111111; padding-bottom: 10px; margin: 60px 0 40px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr; } }
        .product-item img { width: 100%; display: block; border: 1px solid #161616; }
        .status-label { font-size: 0.7rem; color: #444444; border: 1px solid #161616; padding: 6px 14px; display: inline-block; margin-top: 15px; }
        .back-home { font-size: 0.75rem; margin-top: 60px; }
        .back-home a { color: #444444; text-decoration: none; }
    </style>
</head>
<body>

    <div class="header-logo"><a href="index.html">SYRINX</a></div>

    <div class="store-container">
        <div class="section-title">ARCHIVE</div>
        <div class="product-grid">
            <div class="product-item">
                <img src="images/book.png" alt="Archive">
                <span class="status-label">COMING IN JULY</span>
            </div>
        </div>

        <div class="section-title">APPAREL</div>
        <div class="product-grid">
            <div class="product-item">
                <img src="images/tshirt.png" alt="Apparel">
                <span class="status-label">COMING SOON</span>
            </div>
            <div class="product-item">
                <img src="images/cap.png" alt="Apparel">
                <span class="status-label">COMING SOON</span>
            </div>
        </div>
    </div>

    <div class="back-home"><a href="index.html">← BACK TO HOME</a></div>

</body>
</html>
