<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Store</title>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .header-logo { font-size: 1.1rem; letter-spacing: 0.5rem; margin-bottom: 60px; }
        .store-container { max-width: 800px; width: 100%; }
        .section-title { font-size: 0.7rem; letter-spacing: 0.2rem; color: #555555; border-bottom: 1px solid #111111; padding-bottom: 10px; margin: 60px 0 40px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr; } }
        
        /* 이미지 영역 스타일 - 이미지가 없어도 틀을 유지 */
        .product-item { width: 100%; }
        .image-placeholder { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background-color: #111111; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #161616;
            color: #333333;
            font-size: 0.7rem;
        }
        .product-item img { width: 100%; display: block; border: 1px solid #161616; }
        .status-label { font-size: 0.6rem; color: #444444; margin-top: 15px; display: block; letter-spacing: 0.1rem; }
    </style>
</head>
<body>

    <div class="header-logo"><a href="index.html" style="color:#ffffff; text-decoration:none;">SYRINX</a></div>

    <div class="store-container">
        <div class="section-title">ARCHIVE</div>
        <div class="product-grid">
            <div class="product-item">
                <img src="images/book1.png" alt="Archive">
                <span class="status-label">COMING IN JULY</span>
            </div>
        </div>

        <div class="section-title">APPAREL</div>
        <div class="product-grid">
            <div class="product-item">
                <div class="image-placeholder">READYING SILHOUETTE</div>
                <span class="status-label">COMING SOON</span>
            </div>
            <div class="product-item">
                <div class="image-placeholder">READYING SILHOUETTE</div>
                <span class="status-label">COMING SOON</span>
            </div>
        </div>
    </div>
</body>

</body>
</html>
