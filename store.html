<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Store</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        /* 상단 헤더 로고 */
        .header-logo {
            font-size: 1.1rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        
        .header-logo a {
            color: #444444;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .header-logo a:hover {
            color: #ffffff;
        }

        /* 스토어 컨테이너 */
        .store-container {
            max-width: 800px;
            width: 100%;
            margin-bottom: 60px;
        }

        /* 섹션 타이틀 */
        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            color: #555555;
            text-transform: uppercase;
            border-bottom: 1px solid #111111;
            padding-bottom: 10px;
            margin-top: 60px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        /* 상품 그리드 */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 50px;
            }
        }

        /* 상품 아이템 */
        .product-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 이미지 플레이스홀더 */
        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #0a0a0a;
            border: 1px solid #161616;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            color: #333333;
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .product-item:hover .product-image-placeholder {
            border-color: #222222;
        }

        .product-info {
            width: 100%;
        }

        .product-name {
            font-size: 0.85rem;
            letter-spacing: 0.05rem;
            color: #ffffff;
            margin-bottom: 15px; /* 라벨과의 간격 조정 */
            font-weight: 400;
        }

        /* 준비중 상태의 미니멀 라벨 */
        .status-label {
            font-size: 0.7rem;
            letter-spacing: 0.08rem;
            color: #444444;
            border: 1px solid #161616;
            padding: 6px 14px;
            text-transform: uppercase;
            cursor: default;
            display: inline-block;
        }
        
        /* 7월 런칭 강조 스타일 */
        .status-label.released-month {
            color: #888888;
            border-color: #333333;
        }
