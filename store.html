<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Store</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        .header-logo {
            font-size: 1.1rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        
        .header-logo a {
            color: #444444;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .header-logo a:hover {
            color: #ffffff;
        }

        .store-container {
            max-width: 800px;
            width: 100%;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            color: #555555;
            text-transform: uppercase;
            border-bottom: 1px solid #111111;
            padding-bottom: 10px;
            margin-top: 60px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .section-title:first-of-type {
            margin-top: 0;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 50px;
            }
        }

        .product-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #0a0a0a;
            border: 1px solid #161616;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            color: #333333;
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .product-item:hover .product-image-placeholder {
            border-color: #222222;
        }

        .product-info {
            width: 100%;
        }

        .product-name {
            font-size: 0.85rem;
            letter-spacing: 0.05rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .status-label {
            font-size: 0.7rem;
            letter-spacing: 0.08rem;
            color: #444444;
            border: 1px solid #161616;
            padding: 6px 14px;
            text-transform: uppercase;
            cursor: default;
            display: inline-block;
        }
        
        .status-label.released-month {
            color: #888888;
            border-color: #333333;
        }

        .back-home {
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
            margin-top: 40px;
        }
        
        .back-home a {
            color: #444444;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-home a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="header-logo"><a href="index.html">SYRINX</a></div>

    <div class="store-container">
        
        <div class="section-title">01. Print & Digital Archive</div>
        <div class="product-grid">
            <div class="product-item">
                <div class="product-image-placeholder">SYRINX BOOK COVER</div>
                <div class="product-info">
                    <div class="product-name">SYRINX : 1st Official Book</div>
                    <span class="status-label released-month">COMING IN JULY</span>
                </div>
            </div>
        </div>

        <div class="section-title">02. Apparel Line</div>
        <div class="product-grid">
            <div class="product-item">
                <div class="product-image-placeholder">SYRINX SIGNATURE T-SHIRT</div>
                <div class="product-info">
                    <div class="product-name">Syrinx Essential T-Shirt</div>
                    <span class="status-label">COMING SOON</span>
                </div>
            </div>
            <div class="product-item">
                <div class="product-image-placeholder">SYRINX MINIMAL CAP</div>
                <div class="product-info">
                    <div class="product-name">Syrinx Structure Ball Cap</div>
                    <span class="status-label">COMING SOON</span>
                </div>
            </div>
        </div>
    </div>

    <div class="back-home">
        <a href="index.html">← BACK TO HOME</a>
    </div>

</body>
</html>
