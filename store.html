<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Store</title>
    <script src="https://gumroad.com/js/gumroad.js"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .header-logo { font-size: 1.1rem; letter-spacing: 0.5rem; margin-bottom: 60px; }
        .store-container { max-width: 800px; width: 100%; }
        
        /* 섹션 제목 */
        .section-title { font-size: 0.7rem; letter-spacing: 0.2rem; color: #555555; border-bottom: 1px solid #111111; padding-bottom: 10px; margin: 60px 0 40px; }
        
        /* 제품 그리드 (깨짐 방지 로직 포함) */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr; } }
        
        .product-item { width: 100%; min-width: 0; }
        
        /* 이미지 플레이스홀더 (사진 없을 때 대응) */
        .image-placeholder { 
            width: 100%; aspect-ratio: 1 / 1; background-color: #111111; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid #161616; color: #333333; font-size: 0.7rem; box-sizing: border-box; 
        }

        /* 실제 이미지 스타일 (비율 강제) */
        .product-item img { 
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover; 
            display: block; border: 1px solid #161616; 
        }

        /* 상태 라벨 및 버튼 */
        .status-label { font-size: 0.6rem; color: #444444; margin-top: 15px; display: block; letter-spacing: 0.1rem; }
        .purchase-btn { 
            display: inline-block; margin-top: 15px; padding: 10px 20px; 
            background: #ffffff; color: #000000; text-decoration: none; 
            font-size: 0.7rem; letter-spacing: 0.1rem; text-transform: uppercase; 
            transition: opacity 0.3s;
        }
        .purchase-btn:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header-logo"><a href="index.html" style="color:#ffffff; text-decoration:none;">SYRINX</a></div>

    <div class="store-container">
        <div class="section-title">ARCHIVE</div>
        <div class="product-grid">
            <div class="product-item">
                <img src="images/book1.png" alt="Archive">
                <span class="status-label">AVAILABLE</span>
                <a class="purchase-btn" href="https://syrinx.gumroad.com/l/제품코드">PURCHASE</a>
            </div>
        </div>

        <div class="section-title">APPAREL</div>
        <div class="product-grid">
            <div class="product-item">
                <div class="image-placeholder">READYING SILHOUETTE</div>
                <span class="status-label">COMING SOON</span>
            </div>
            <div class="product-item">
                <div class="image-placeholder">READYING SILHOUETTE</div>
                <span class="status-label">COMING SOON</span>
            </div>
        </div>
    </div>
</body>
</html>
