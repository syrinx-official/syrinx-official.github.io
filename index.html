<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYRINX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 모바일 브라우저 하단 툴바 대응을 위해 100dvh 사용 */
        body { 
            background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; 
            height: 100dvh; display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; cursor: pointer; touch-action: manipulation; position: relative;
        }
        
        body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px); background-size: 400px 400px; opacity: 0.12; z-index: 0; pointer-events: none; }
        
        .header { margin-top: 60px; font-size: 1.4rem; letter-spacing: 0.8rem; text-transform: uppercase; font-weight: 300; z-index: 100; }
        
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; z-index: 10; pointer-events: none; }
        
        .canvas-wrap { position: absolute; width: 150vw; height: 150vw; max-width: 1200px; max-height: 1200px; z-index: 5; }
        canvas { width: 100%; height: 100%; opacity: 0.8; }
        
        .nav { display: flex; flex-direction: column; align-items: center; gap: 40px; z-index: 200; pointer-events: auto; }
        .nav a { color: #ffffff; text-decoration: none; font-size: 0.75rem; letter-spacing: 0.4rem; text-transform: uppercase; font-weight: 300; transition: color 0.4s; }
        .nav a:hover { color: #888; }
        
        /* 푸터를 절대 위치가 아닌 하단 고정 영역으로 배치 */
        #footer { width: 100%; text-align: center; z-index: 100; padding-bottom: 30px; }
        .contact-row { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 0.55rem; color: #666; letter-spacing: 0.05rem; white-space: nowrap; }
        .copyright { font-size: 0.5rem; color: #222; margin-top: 15px; text-transform: uppercase; }

        @media (max-width: 480px) { 
            .header { font-size: 1.1rem; margin-top: 40px; } 
            .nav { gap: 30px; } 
            .contact-row { font-size: 0.5rem; gap: 8px; } 
            #footer { padding-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">SYRINX</div>
    <div class="main-content">
        <div class="canvas-wrap"><canvas id="c"></canvas></div>
        <nav class="nav">
            <a href="store.html">STORE</a>
            <a href="brand-history.html">BRAND HISTORY</a>
        </nav>
    </div>
    <section id="footer">
        <div class="contact-row">
            <span style="color: #444;">CONTACT</span>
            <span>syrinx.official@email.com</span>
            <span>@syrinx_official</span>
        </div>
        <p class="copyright">&copy; 2026 SYRINX. ALL RIGHTS RESERVED.</p>
    </section>

    <script>
        // ... (스크립트 동일)
        // 위에서 수정한 스크립트 코드를 그대로 붙여넣으세요.
    </script>
</body>
</html>
