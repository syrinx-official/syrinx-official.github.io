<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX - Brand History</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        /* 상단 헤더 로고 및 메인 이동 링크 */
        .header-logo {
            font-size: 1.1rem;
            letter-spacing: 0.5rem;
            font-weight: 300;
            text-transform: uppercase;
        }
        
        .header-logo a {
            color: #444444; /* 기본은 차분한 다크 그레이 */
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .header-logo a:hover {
            color: #ffffff; /* 마우스를 올리면 선명한 흰색으로 전환 */
        }

        /* 컨테이너 및 타이틀 */
        .history-container {
            max-width: 520px;
            width: 100%;
            text-align: center;
            margin: 40px 0;
        }

        .history-title {
            font-size: 1rem;
            letter-spacing: 0.3rem;
            color: #ffffff;
            font-weight: 400;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* 미니멀 다국어 스위처 */
        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .lang-btn {
            font-size: 0.7rem;
            letter-spacing: 0.1rem;
            color: #444444;
            cursor: pointer;
            transition: color 0.3s;
            font-weight: 400;
        }

        .lang-btn.active, .lang-btn:hover {
            color: #ffffff;
        }

        /* 본문 스타일 및 전환 애니메이션 */
        .history-body {
            font-size: 0.85rem;
            letter-spacing: 0.08rem;
            line-height: 2.2;
            color: #999999;
            font-weight: 300;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 활성화된 언어 본문만 노출 */
        .history-body.active {
            display: block;
            opacity: 1;
        }

        .history-body p {
            margin: 0 0 35px 0;
        }

        .history-slogan {
            margin-top: 50px;
            font-size: 0.8rem;
            letter-spacing: 0.15rem;
            color: #555555;
            font-style: italic;
        }

        /* 하단 뒤로가기 */
        .back-home {
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
        }
        
        .back-home a {
            color: #444444;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-home a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="header-logo"><a href="index.html">SYRINX</a></div>

    <div class="history-container">
        <div class="history-title">Brand History</div>
        
        <div class="lang-switcher">
            <span class="lang-btn active" onclick="changeLang('en')">EN</span>
            <span class="lang-btn" onclick="changeLang('ko')">KR</span>
            <span class="lang-btn" onclick="changeLang('fr')">FR</span>
            <span class="lang-btn" onclick="changeLang('it')">IT</span>
            <span class="lang-btn" onclick="changeLang('es')">ES</span>
        </div>

        <div id="lang-en
