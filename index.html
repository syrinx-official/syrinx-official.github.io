<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }
        .logo {
            font-size: 1.5rem;
            letter-spacing: 0.8rem;
            font-weight: 300;
            text-transform: uppercase;
            margin-top: 40px;
        }
        .logo a {
            color: #ffffff;
            text-decoration: none;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }
        nav ul li a {
            color: #555555;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.3rem;
            transition: color 0.3s ease;
            font-weight: 300;
            text-transform: uppercase;
        }
        nav ul li a:hover {
            color: #ffffff;
        }
        footer {
            font-size: 0.65rem;
            letter-spacing: 0.1rem;
            color: #333333;
            margin-bottom: 20px;
        }
    </style>
</head>

    <div class="logo"><a href="index.html">SYRINX</a></div>

    <nav>
        <ul>
            <li><a href="brand-history.html">Brand History</a></li>
