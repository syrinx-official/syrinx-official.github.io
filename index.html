<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYRINX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; touch-action: manipulation; transition: all 0.8s ease;
        }
        body.is-warping { background-color: #ffffff; color: #000000; }
        body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px); background-size: 400px 400px; opacity: 0.12; z-index: 0; pointer-events: none; }
        
        .header { position: absolute; top: 60px; font-size: 1.4rem; letter-spacing: 0.8rem; text-transform: uppercase; font-weight: 300; z-index: 100; pointer-events: none; }
        .canvas-wrap { position: absolute; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        canvas { width: 100%; height: 100%; display: block; }
        
        .nav { display: flex; flex-direction: column; align-items: center; gap: 40px; z-index: 200; pointer-events: auto; }
        .nav a { color: inherit; text-decoration: none; font-size: 0.75rem; letter-spacing: 0.4rem; text-transform: uppercase; font-weight: 300; transition: color 0.4s; }
        .nav a:hover { color: #888; }
        
        #footer { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        .contact-row { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 0.55rem; color: #666; letter-spacing: 0.05rem; }
        .copyright { font-size: 0.5rem; color: #666; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">SYRINX</div>
    <div class="canvas-wrap"><canvas id="c"></canvas></div>
    <nav class="nav">
        <a href="store.html">STORE</a>
        <a href="brand-history.html">BRAND HISTORY</a>
    </nav>
    <section id="footer">
        <div class="contact-row">
            <span>CONTACT</span> <span>syrinx.official@email.com</span> <span>@syrinx_official</span>
        </div>
        <p class="copyright">&copy; 2026 SYRINX. ALL RIGHTS RESERVED.</p>
    </section>

    <script>
        const cv = document.getElementById('c'), ctx = cv.getContext('2d');
        let W, H, cx, cy, t = 0, isWarping = false;
        let audioCtx, masterGain;

        function resize() { W = cv.width = cv.offsetWidth; H = cv.height = cv.offsetHeight; cx = W/2; cy = H/2; }
        window.addEventListener('resize', resize); resize();

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain(); masterGain.gain.value = 0.2;
            masterGain.connect(audioCtx.destination);
            playAmbientSound();
        }

        function playAmbientSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); 
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = 100 + Math.sin(t * 0.01) * 20;
            g.gain.value = 0.03;
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            setTimeout(playAmbientSound, 100);
        }

        function drawElegantHourglass() {
            const size = 60, pulse = Math.sin(t * 0.05) * 8;
            ctx.strokeStyle = isWarping ? "#000" : "#fff"; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - size, cy - size);
            ctx.quadraticCurveTo(cx, cy - size - pulse, cx + size, cy - size);
            ctx.lineTo(cx - size, cy + size);
            ctx.quadraticCurveTo(cx, cy + size + pulse, cx + size, cy + size);
            ctx.closePath(); ctx.stroke();
            ctx.fillStyle = isWarping ? "rgba(0,0,0,0.05)" : "rgba(255,255,255,0.05)";
            ctx.fill();
        }

        function frame() {
            ctx.clearRect(0, 0, W, H);
            if (isWarping) {
                drawElegantHourglass();
            } else {
                // 궤도 사이즈를 화면보다 훨씬 크게 설정 (화면 밖으로 나감)
                const R = Math.max(W, H) * 0.7; 
                [{rx: 0.8, rz: 0.2, spd: 0.003}, {rx: -0.6, rz: 1.1, spd: 0.002}, {rx: 0.4, rz: -0.8, spd: 0.004}].forEach(orb => {
                    ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.15)";
                    for(let a=0; a<Math.PI*2; a+=0.1) {
                        let x = R * Math.cos(a + t * orb.spd), y = R * Math.sin(a + t * orb.spd);
                        let y1 = y * Math.cos(orb.rx), z1 = y * Math.sin(orb.rx);
                        let x2 = x * Math.cos(orb.rz) - y1 * Math.sin(orb.rz);
                        let y2 = x * Math.sin(orb.rz) + y1 * Math.cos(orb.rz);
                        a === 0 ? ctx.moveTo(cx + x2, cy + y2) : ctx.lineTo(cx + x2, cy + y2);
                    }
                    ctx.stroke();
                });
            }
            t++; requestAnimationFrame(frame);
        }
        frame();

        document.body.addEventListener('click', () => { initAudio(); }, { once: true });
        
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                if(isWarping) return;
                isWarping = true;
                document.body.classList.add('is-warping');
                setTimeout(() => { window.location.href = this.href; }, 1200);
            });
        });
    </script>
</body>
</html>
