<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYRINX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; 
            height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; cursor: pointer; touch-action: manipulation; 
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), filter 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.is-transitioning { opacity: 0; filter: blur(20px); }
        body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px); background-size: 400px 400px; opacity: 0.12; z-index: 0; pointer-events: none; }
        
        .header { position: absolute; top: 60px; font-size: 1.4rem; letter-spacing: 0.8rem; text-transform: uppercase; font-weight: 300; z-index: 100; }
        .main-content { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; z-index: 10; position: relative; }
        .canvas-wrap { position: absolute; width: 100%; height: 100%; max-width: 1000px; max-height: 1000px; z-index: 5; }
        canvas { width: 100%; height: 100%; display: block; }
        
        .nav { display: flex; flex-direction: column; align-items: center; gap: 40px; z-index: 200; pointer-events: auto; }
        .nav a { color: #ffffff; text-decoration: none; font-size: 0.75rem; letter-spacing: 0.4rem; text-transform: uppercase; font-weight: 300; transition: color 0.4s; }
        .nav a:hover { color: #888; }
        
        #footer { position: absolute; bottom: 30px; width: 100%; text-align: center; z-index: 100; }
        .contact-row { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 0.55rem; color: #666; letter-spacing: 0.05rem; }
        .copyright { font-size: 0.5rem; color: #222; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">SYRINX</div>
    <div class="main-content">
        <div class="canvas-wrap"><canvas id="c"></canvas></div>
        <nav class="nav">
            <a href="store.html">STORE</a>
            <a href="brand-history.html">BRAND HISTORY</a>
        </nav>
    </div>
    <section id="footer">
        <div class="contact-row">
            <span>CONTACT</span> <span>syrinx.official@email.com</span> <span>@syrinx_official</span>
        </div>
        <p class="copyright">&copy; 2026 SYRINX. ALL RIGHTS RESERVED.</p>
    </section>

    <script>
        const cv = document.getElementById('c'), ctx = cv.getContext('2d');
        let W, H, cx, cy, t = 0, isWarping = false;

        function resize() { 
            W = cv.width = cv.offsetWidth; 
            H = cv.height = cv.offsetHeight; 
            cx = W/2; cy = H/2; 
        }
        window.addEventListener('resize', resize); resize();

        // 뒤로가기 시 즉각적인 복구
        window.onpageshow = (event) => {
            isWarping = false;
            document.body.classList.remove('is-transitioning');
            document.body.style.opacity = "1";
            document.body.style.filter = "blur(0px)";
        };

        function getOrbitPt(r, a, tx, tz) {
            let x = r * Math.cos(a), y = r * Math.sin(a);
            let y1 = y * Math.cos(tx), z1 = y * Math.sin(tx);
            let x2 = x * Math.cos(tz) - y1 * Math.sin(tz), y2 = x * Math.sin(tz) + y1 * Math.cos(tz);
            return { x: cx + x2, y: cy + y2, z: z1 };
        }

        const orbitSpecs = [{ rx: 0.8, rz: 0.2, spd: 0.005, color: '#fff' }, { rx: -0.6, rz: 1.1, spd: 0.004, color: '#fff' }, { rx: 0.4, rz: -0.8, spd: 0.007, color: '#fff' }];

        function frame() {
            if (isWarping) return;
            ctx.clearRect(0, 0, W, H);
            const R = Math.min(W, H) * 0.4;
            orbitSpecs.forEach(orb => {
                ctx.beginPath();
                ctx.strokeStyle = orb.color; ctx.globalAlpha = 0.1;
                for(let a=0; a<Math.PI*2; a+=0.2) {
                    let p = getOrbitPt(R, a, orb.rx, orb.rz);
                    a === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                }
                ctx.stroke();
                let pt = getOrbitPt(R, (t * orb.spd), orb.rx, orb.rz);
                ctx.globalAlpha = 1;
                ctx.fillStyle = "#fff";
                ctx.beginPath(); ctx.arc(pt.x, pt.y, 2, 0, Math.PI*2); ctx.fill();
            });
            t++; requestAnimationFrame(frame);
        }
        frame();

        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                if(isWarping) return;
                isWarping = true;
                if(audioCtx) audioCtx.resume();
                
                document.body.classList.add('is-transitioning');
                setTimeout(() => { window.location.href = this.href; }, 500);
            });
        });

        let audioCtx;
        function playSound() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // 생략된 사운드 로직...
        }
        document.addEventListener('click', playSound, { once: true });
    </script>
</body>
</html>
