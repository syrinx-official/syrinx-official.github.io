<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX</title>
    <style>
        /* 기본 배경 및 레이아웃 설정 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* 메인 영역 (중앙 로고) */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .brand-logo {
            font-size: 2.2rem;
            letter-spacing: 0.6rem;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* 하단 푸터 영역 */
        footer {
            width: 100%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 메뉴 스타일 (살짝 회색조) */
        .footer-menu {
            display: flex;
            justify-content: center;
            gap: 24px;
            list-style: none;
            padding: 0;
            margin: 0;
            flex-wrap: wrap;
        }

        .footer-menu a {
            color: #777777; /* 차분한 회색 */
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.15rem;
            transition: color 0.3s;
            font-weight: 400;
        }

        .footer-menu a:hover {
            color: #ffffff; /* 마우스 올리면 흰색 */
        }

        /* 이메일 & 인스타 정보 스타일 */
        .footer-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 5px;
        }
        
        .footer-info a {
            color: #444444; /* 메뉴보다 더 연한 회색 */
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 0.05rem;
            transition: color 0.3s;
        }
        
        .footer-info a:hover {
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="brand-logo">SYRINX</div>
    </div>

    <footer>
        <ul class="footer-menu">
            <li><a href="#">ARCHIVE</a></li>
            <li><a href="#">BOOKS</a></li>
            <li><a href="#">STORE</a></li>
            <li><a href="#">JOURNAL</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>

        <div class="footer-info">
