<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYRINX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 60px 20px 30px; overflow: hidden; cursor: pointer; touch-action: manipulation; }
        body::before { content: ""; position: absolute; inset: 0; background: radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px); background-size: 400px 400px; opacity: 0.12; z-index: 0; pointer-events: none; }
        .header { font-size: 1.4rem; letter-spacing: 0.8rem; text-transform: uppercase; font-weight: 300; z-index: 100; }
        .main-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .canvas-wrap { position: absolute; width: 150vw; height: 150vw; max-width: 1200px; max-height: 1200px; z-index: 5; }
        canvas { width: 100%; height: 100%; opacity: 0.8; }
        .nav { display: flex; flex-direction: column; align-items: center; gap: 40px; z-index: 200; pointer-events: auto; }
        .nav a { color: #ffffff; text-decoration: none; font-size: 0.75rem; letter-spacing: 0.4rem; text-transform: uppercase; font-weight: 300; transition: color 0.4s; }
        .nav a:hover { color: #888; }
        #footer { width: 100%; text-align: center; z-index: 100; }
        .contact-row { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 0.55rem; color: #666; letter-spacing: 0.05rem; white-space: nowrap; }
        .copyright { font-size: 0.5rem; color: #222; margin-top: 15px; text-transform: uppercase; }
        @media (max-width: 480px) { .header { font-size: 1.1rem; } .nav { gap: 30px; } .contact-row { font-size: 0.5rem; gap: 8px; } }
    </style>
</head>
<body>
    <div class="header">SYRINX</div>
    <div class="main-content">
        <div class="canvas-wrap"><canvas id="c"></canvas></div>
        <nav class="nav">
            <a href="store.html">STORE</a>
            <a href="brand-history.html">BRAND HISTORY</a>
        </nav>
    </div>
    <section id="footer">
        <div class="contact-row">
            <span style="color: #444;">CONTACT</span>
            <span>syrinx.official@email.com</span>
            <span>@syrinx_official</span>
        </div>
        <p class="copyright">&copy; 2026 SYRINX. ALL RIGHTS RESERVED.</p>
    </section>

    <script>
        const cv = document.getElementById('c'), ctx = cv.getContext('2d');
        let W, H, cx, cy, t = 0, isWarping = false;

        function resize() { W = cv.width = cv.offsetWidth; H = cv.height = cv.offsetHeight; cx = W/2; cy = H/2; }
        window.addEventListener('resize', resize); resize();

        function getOrbitPt(r, a, tx, tz) {
            let x = r * Math.cos(a), y = r * Math.sin(a);
            let y1 = y * Math.cos(tx), z1 = y * Math.sin(tx);
            let x2 = x * Math.cos(tz) - y1 * Math.sin(tz), y2 = x * Math.sin(tz) + y1 * Math.cos(tz);
            return { x: cx + x2, y: cy + y2, z: z1 };
        }

        const orbitSpecs = [
            { rx: 0.8, rz: 0.2, spd: 0.005, color: 'rgba(255,255,255,0.05)' },
            { rx: -0.6, rz: 1.1, spd: 0.004, color: 'rgba(255,255,255,0.03)' },
            { rx: 0.4, rz: -0.8, spd: 0.007, color: 'rgba(255,255,255,0.04)' }
        ];

        function frame() {
            if (isWarping) return;
            ctx.clearRect(0, 0, W, H);
            const R = Math.min(W, H) * 0.6;
            orbitSpecs.forEach(orb => {
                ctx.beginPath();
                for(let a=0; a<Math.PI*2; a+=0.2) {
                    let p = getOrbitPt(R, a, orb.rx, orb.rz);
                    a === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();
                ctx.strokeStyle = orb.color;
                ctx.lineWidth = 0.5;
                ctx.stroke();

                let irregularAngle = (t * orb.spd) + Math.sin(t * 0.02) * 0.5;
                let pt = getOrbitPt(R, irregularAngle, orb.rx, orb.rz);
                ctx.fillStyle = `rgba(255,255,255,${pt.z > 0 ? 0.9 : 0.3})`;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.z > 0 ? 3.5 : 1.5, 0, Math.PI*2); ctx.fill();
            });
            t++; requestAnimationFrame(frame);
        }
        frame();

        // 페이지 전환 워프 애니메이션
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                if(isWarping) return;
                isWarping = true;
                const target = this.href;
                document.body.style.transition = "background 0.3s ease";
                document.body.style.backgroundColor = "#ffffff";
                
                let warpSpeed = 1.0;
                function warp() {
                    warpSpeed *= 1.2;
                    ctx.fillStyle = 'rgba(0,0,0,0.15)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(cx, cy, 2 * warpSpeed, 0, Math.PI * 2);
                    ctx.fill();
                    if (warpSpeed < 200) requestAnimationFrame(warp);
                    else window.location.href = target;
                }
                warp();
            });
        });

        // 사운드 시스템 (모바일 호환성 강화)
        let audioCtx;
        function playSound() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const master = audioCtx.createGain(); master.connect(audioCtx.destination);
            master.gain.value = 0.3;
            [55, 110, 165].forEach(f => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.value = f; g.gain.value = 0.05;
                osc.connect(g); g.connect(master); osc.start();
            });
            function ping() {
                if(Math.random() > 0.7) {
                    const osc = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    osc.frequency.value = 200 + Math.random() * 800;
                    g.gain.setValueAtTime(0, audioCtx.currentTime);
                    g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 0.01);
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                    osc.connect(g); g.connect(master);
                    osc.start(); osc.stop(audioCtx.currentTime + 1);
                }
                setTimeout(ping, 2000 + Math.random() * 3000);
            }
