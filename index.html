<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX</title>
    <style>
        /* 기본 배경 및 레이아웃 설정 */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        /* 메인 영역 (중앙 로고만 미니멀하게 배치) */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .brand-logo {
            font-size: 2.5rem;
            letter-spacing: 0.7rem;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* 하단 푸터 영역 */
        footer {
            width: 100%;
            max-width: 800px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* 메뉴 스타일 */
        .footer-menu {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style: none;
            padding: 0;
            margin: 0;
            flex-wrap: wrap;
        }

        .footer-menu a {
            color: #777777; /* 차분한 회색 */
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.15rem;
            transition: color 0.3s;
            font-weight: 400;
        }

        .footer-menu a:hover {
            color: #ffffff; /* 마우스 올리면 흰색 */
        }

        /* 컨택트 정보 스타일 (최하단) */
        .footer-contact {
            color: #444444; /* 메뉴보다 연한 회색 */
            font-size: 0.7rem;
            letter-spacing: 0.05rem;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .contact-label {
            font-weight: 500;
            color: #555555;
        }

        .footer-contact a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .footer-contact a:hover {
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="brand-logo">SYRINX</div>
    </div>

    <footer>
        <ul class="footer-menu">
            <li><a href="coming-soon.html">BRAND HISTORY</a></li>
            <li><a href="coming-soon.html">STORE</a></li>
        </ul>

        <div class="footer-contact">
            <span class="contact-label">CONTACT:</span>
            <a href="mailto:syrnxofficial@gmail.com">syrnxofficial@gmail.com</a>
            <a href="https://instagram.com/official_syrinx" target="_blank">@official_syrinx</a>
        </div>
    </footer>

</body>
</html>
