<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 40px;
            position: relative;
            overflow: hidden;
            cursor: pointer; /* 클릭 유도 */
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        /* 황금 비율을 고려한 간격 설정 */
        .header {
            font-size: 1.6rem;
            letter-spacing: 0.9rem;
            text-transform: uppercase;
            font-weight: 300;
            z-index: 10;
            margin-bottom: 120px; /* 로고와 메뉴 사이 황금비율 간격 */
        }

        .canvas-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .nav {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            z-index: 20;
            margin-bottom: auto;
        }

        .nav a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        #footer {
            margin-top: auto;
            text-align: center;
            z-index: 10;
        }
        .contact-row {
            display: flex; justify-content: center; align-items: center; gap: 20px;
            font-size: 0.7rem; color: #777; letter-spacing: 0.1rem;
        }
        .copyright {
            font-size: 0.6rem; color: #333; letter-spacing: 0.15rem; margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="header">SYRINX</div>

    <div class="canvas-wrap">
        <canvas id="c" width="900" height="900"></canvas>
    </div>

    <nav class="nav">
        <a href="store.html">STORE</a>
        <a href="brand-history.html">BRAND HISTORY</a>
    </nav>

    <section id="footer">
        <div class="contact-row">
            <span>CONTACT</span>
            <span>syrinx.official@email.com</span>
            <span>@syrinx_official</span>
        </div>
        <p class="copyright">&copy; 2026 SYRINX. ALL RIGHTS RESERVED.</p>
    </section>

    <script>
        /* ── 원자 애니메이션 로직 (동일) ── */
        const cv = document.getElementById('c'), ctx = cv.getContext('2d');
        const W = 900, H = 900, cx = 450, cy = 450;
        let t = 0, rotX = 0.38, rotY = 0.08, targetRX = 0.38, targetRY = 0.08;

        document.addEventListener('mousemove', e => {
            const r = cv.getBoundingClientRect();
            targetRX = 0.38 + (e.clientY - r.top - H/2) / (H/2) * 0.2;
            targetRY = 0.08 + (e.clientX - r.left - W/2) / (W/2) * 0.2;
        });

        function rot3(x, y, z, rx, ry) {
            let y1 = y * Math.cos(rx) - z * Math.sin(rx), z1 = y * Math.sin(rx) + z * Math.cos(rx);
            let x2 = x * Math.cos(ry) + z1 * Math.sin(ry);
            return { x: x2, y: y1, z: -x * Math.sin(ry) + z1 * Math.cos(ry) };
        }

        const R = 400, ORBITS = [{tx:0, tz:0, spd:1, ph:0}, {tx:1.05, tz:0, spd:0.72, ph:2.09}, {tx:0.52, tz:1.0, spd:0.55, ph:4.19}];

        function orbitPt(orb, a, rx, ry) {
            let lx = R * Math.cos(a), ly = R * Math.sin(a);
            let y1 = ly * Math.cos(orb.tx), z1 = ly * Math.sin(orb.tx);
            let x2 = lx * Math.cos(orb.tz) - y1 * Math.sin(orb.tz), y2 = lx * Math.sin(orb.tz) + y1 * Math.cos(orb.tz);
            return rot3(x2, y2, z1, rx, ry);
        }

        function frame() {
            ctx.clearRect(0, 0, W, H);
            rotX += (targetRX - rotX) * 0.05; rotY += (targetRY - rotY) * 0.05;
            ORBITS.forEach(o => {
                ctx.beginPath();
                for (let a = 0; a <= Math.PI*2 + 0.1; a += 0.05) {
                    const p = orbitPt(o, a, rotX, rotY);
                    a === 0 ? ctx.moveTo(cx+p.x, cy+p.y) : ctx.lineTo(cx+p.x, cy+p.y);
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.stroke();
            });
            t++; requestAnimationFrame(frame);
        }
        frame();

        /* ── 사운드 자동 시작 로직 ── */
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const master = audioCtx.createGain();
            master.connect(audioCtx.destination);
            
            // 베이스 드론 사운드
            [55, 110, 165].forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.frequency.value = f; g.gain.value = 0.2 / (i+1);
                osc.connect(g); g.connect(master); osc.start();
            });
        }

        document.addEventListener('click', () => {
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    </script>
</body>
</html>
