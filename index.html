<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRINX</title>
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            padding: 80px 20px 40px 20px; 
            box-sizing: border-box;
        }
        /* 메인 로고 */
        .header { font-size: 1.5rem; letter-spacing: 0.8rem; text-transform: uppercase; margin-bottom: 80px; text-align: center; }
        
        /* 네비게이션: STORE 먼저, HISTORY 아래로 */
        .nav { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-bottom: 100px; }
        .nav a { color: #ffffff; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.2rem; transition: color 0.3s; }
        .nav a:hover { color: #888888; }
        
        /* 하단 섹션 */
        #footer { 
            margin-top: auto; 
            text-align: center; 
            color: #ffffff; 
            padding-top: 80px;
        }
        .contact-info { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            font-size: 0.85rem; 
            color: #aaaaaa; 
            margin-top: 20px;
            margin-bottom: 40px;
        }
        .copyright { 
            font-size: 0.7rem; 
            color: #333333; 
            letter-spacing: 0.1rem; 
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="header">SYRINX</div>

    <div class="nav">
        <a href="store.html">STORE</a>
        <a href="brand-history.html">HISTORY</a>
    </div>

    <section id="footer">
        <h2 style="font-size: 0.7rem; letter-spacing: 0.2rem; color: #555555; text-transform: uppercase; font-weight: 400; margin: 0;">CONTACT</h2>
        
        <div class="contact-info">
            <span>syrinx.official@email.com</span>
            <span>@syrinx_official</span>
        </div>

        <p class="copyright">
            &copy; 2026 SYRINX. ALL RIGHTS RESERVED.
        </p>
    </section>

</body>
</html>
